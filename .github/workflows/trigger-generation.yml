name: Trigger Phonk Generation (Workflow A)

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline dependencies
        run: pip install --break-system-packages pillow kaggle

      - name: 1-3. Generate prompts, covers, metadata (CPU, free)
        run: |
          python prompts/prompt_generator.py --count 4 --out output/prompts_batch.json
          python cover/cover_art.py --prompts output/prompts_batch.json --out-dir output/covers
          python metadata/metadata_builder.py --prompts output/prompts_batch.json --out output/metadata.json

      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
          echo "$KAGGLE_KEY" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/kaggle.json ~/.kaggle/access_token

      - name: 4. Bundle kernel + base64 prompts, verify AST, push to Kaggle GPU
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_KEY }}
        run: |
          cp generate/generate_music.py kaggle/generate_music.py
          python - <<'PY'
          import base64, py_compile
          from pathlib import Path
          prompts_json = Path("output/prompts_batch.json").read_bytes()
          prompts_b64 = base64.b64encode(prompts_json).decode("ascii")
          gm_code = Path("generate/generate_music.py").read_bytes()
          gm_b64 = base64.b64encode(gm_code).decode("ascii")
          kernel = Path("kaggle/kaggle_kernel.py").read_text()
          kernel = kernel.replace("__PROMPTS_B64_PLACEHOLDER__", prompts_b64)
          kernel = kernel.replace("__GENERATE_MUSIC_B64_PLACEHOLDER__", gm_b64)
          Path("kaggle/kaggle_kernel.py").write_text(kernel)
          py_compile.compile("kaggle/kaggle_kernel.py", doraise=True)
          print("Base64 prompt & generate_music injection AST verified.")
          PY
          # Update kernel metadata ID with current username if needed
          python - <<'PY'
          import json, os
          from pathlib import Path
          meta = json.loads(Path("kaggle/kernel-metadata.json").read_text())
          user = os.environ.get("KAGGLE_USERNAME", "YOUR_KAGGLE_USERNAME")
          if "YOUR_KAGGLE_USERNAME" in meta["id"]:
              meta["id"] = meta["id"].replace("YOUR_KAGGLE_USERNAME", user)
              Path("kaggle/kernel-metadata.json").write_text(json.dumps(meta, indent=2))
          PY
          kaggle kernels push -p kaggle/
          echo "Kaggle kernel pushed successfully. Exiting without waiting to conserve CPU runner minutes."
