# Daily phonk batch pipeline.
#
# Why split across two free compute pools instead of running everything
# in one place:
#   - GitHub Actions (this workflow): free unlimited minutes on a public
#     repo. Runs the CPU steps directly: prompts, cover art, metadata,
#     packaging, and pushing the finished release. It ALSO drives Kaggle
#     via API for the one step it can't do itself.
#   - Kaggle kernel (triggered by this workflow, see kaggle/kaggle_kernel.py):
#     the only free GPU in this stack. Runs just the ACE-Step-1.5 audio
#     generation and hands the .wav files back.
#
# You do not need to babysit this. Once the two secrets below are set,
# it runs on schedule and drops a finished zip on your repo's Releases
# page every day.

name: Generate Phonk Batch

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily; adjust to taste
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline dependencies
        run: pip install --break-system-packages pillow kaggle

      - name: 1-3. Generate prompts, covers, metadata (CPU, free)
        run: |
          python prompts/prompt_generator.py --count 20 --out output/prompts_batch.json
          python cover/cover_art.py --prompts output/prompts_batch.json --out-dir output/covers
          python metadata/metadata_builder.py --prompts output/prompts_batch.json --out output/metadata.json

      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: 4. Bundle kernel + prompts, push to Kaggle GPU
        run: |
          cp generate/generate_music.py kaggle/generate_music.py
          python - <<'PY'
          from pathlib import Path
          prompts = Path("output/prompts_batch.json").read_text()
          kernel = Path("kaggle/kaggle_kernel.py").read_text()
          kernel = kernel.replace("__PROMPTS_JSON_PLACEHOLDER__", prompts.replace('"""', '\\"\\"\\"'))
          Path("kaggle/kaggle_kernel.py").write_text(kernel)
          PY
          kaggle kernels push -p kaggle/

      - name: Wait for Kaggle kernel to finish
        run: |
          # Kaggle has no push-and-block API, so poll status. Generation for a
          # ~20 track batch on a T4 typically finishes in under 30 minutes;
          # this times out at 90 to leave headroom.
          SLUG=$(python -c "import json;print(json.load(open('kaggle/kernel-metadata.json'))['id'])")
          for i in $(seq 1 18); do
            STATUS=$(kaggle kernels status "$SLUG" | grep -o 'complete\|error\|running\|queued' | head -1)
            echo "Kaggle kernel status: $STATUS"
            if [ "$STATUS" = "complete" ]; then break; fi
            if [ "$STATUS" = "error" ]; then echo "Kernel failed"; exit 1; fi
            sleep 300
          done

      - name: Download generated audio from Kaggle
        run: |
          SLUG=$(python -c "import json;print(json.load(open('kaggle/kernel-metadata.json'))['id'])")
          kaggle kernels output "$SLUG" -p output/kaggle_download/
          mkdir -p output/audio
          unzip -o output/kaggle_download/phonk_audio_batch.zip -d output/audio_tmp || true
          find output/audio_tmp -name "*.wav" -exec mv {} output/audio/ \;

      - name: 5. Package release zip
        run: |
          python package.py --covers output/covers --metadata output/metadata.json --audio output/audio --out-dir output

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "phonk-batch-${{ github.run_id }}"
          files: output/*.zip
