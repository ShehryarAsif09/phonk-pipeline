name: Serverless Phonk Publisher

on:
  schedule:
    # Run every 6 hours (4 posts a day)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger for testing

permissions:
  contents: write # Required to push state updates and download releases

jobs:
  publish:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install playwright google-api-python-client
          playwright install chromium

      - name: Read Publish State
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the latest release tag from GitHub
          LATEST_BATCH=$(gh release view --json tagName -q .tagName || echo "")
          if [ -z "$LATEST_BATCH" ]; then
            echo "ERROR: No releases found in the repository!"
            exit 1
          fi
          echo "LATEST_BATCH=$LATEST_BATCH" >> $GITHUB_ENV
          
          # Read current state
          CURRENT_BATCH=$(jq -r '.current_batch' publish_state.json)
          INDEX=$(jq '.last_published_index' publish_state.json)
          
          # If the latest batch is different from our state, reset the index!
          if [ "$LATEST_BATCH" != "$CURRENT_BATCH" ]; then
            echo "New batch detected! Resetting index."
            CURRENT_BATCH=$LATEST_BATCH
            INDEX=-1
            
            # Save the new batch to state
            jq ".current_batch = \"$LATEST_BATCH\"" publish_state.json > tmp.json && mv tmp.json publish_state.json
          fi
          
          NEXT_INDEX=$((INDEX + 1))
          echo "NEXT_INDEX=$NEXT_INDEX" >> $GITHUB_ENV
          echo "BATCH=$CURRENT_BATCH" >> $GITHUB_ENV

      - name: Download Phonk Batch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p current_batch
          echo "Downloading assets for release: $BATCH"
          gh release download "$BATCH" --dir current_batch --pattern "*.zip" || true
          if ls current_batch/*.zip 1> /dev/null 2>&1; then
            unzip current_batch/*.zip -d unzipped_batch
          else
            echo "ERROR: Batch $BATCH not found in releases or no zip attached."
            exit 1
          fi

      - name: Render MP4 Reel
        run: |
          # The batch folder has nested <slug>/ directories. We use find and sort to guarantee consistent ordering.
          # We grab the file at NEXT_INDEX (0-based), which is line NEXT_INDEX+1 in sed.
          
          SED_LINE=$((NEXT_INDEX + 1))
          AUDIO_FILE=$(find unzipped_batch -name "*.wav" | sort | sed -n "${SED_LINE}p")
          COVER_FILE=$(find unzipped_batch -name "*.png" | sort | sed -n "${SED_LINE}p")
          
          if [ -z "$AUDIO_FILE" ] || [ -z "$COVER_FILE" ]; then
            echo "No more tracks left in batch $BATCH. Halting publisher."
            exit 0
          fi
          
          echo "Rendering reel for: $AUDIO_FILE"
          chmod +x social-publishing-engine/bot_engine/make_reel.sh
          ./social-publishing-engine/bot_engine/make_reel.sh "$COVER_FILE" "$AUDIO_FILE" output_reel.mp4

      - name: Upload to GitHub Releases for IG/FB API Access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # We upload the generated mp4 to a temporary release asset so FB/IG Graph API can access it via URL
          gh release upload "$BATCH" output_reel.mp4 --clobber
          # Get the public URL
          PUBLIC_URL="https://github.com/${{ github.repository }}/releases/download/$BATCH/output_reel.mp4"
          echo "PUBLIC_URL=$PUBLIC_URL" >> $GITHUB_ENV

      - name: Upload via Official APIs
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: |
          CAPTION="🔥 Phonk Daily Drop 🔥 #phonk #gymphonk #drift #music #sigma #gymmotivation"
          
          echo "--- Uploading to YouTube Shorts ---"
          python3 social-publishing-engine/bot_engine/yt_api_uploader.py --file output_reel.mp4 --title "Gym Phonk Drop 🔥" --description "$CAPTION" --tags "phonk,gym,drift" || true
          
          echo "--- Uploading to Instagram Reels ---"
          python3 social-publishing-engine/bot_engine/ig_api_uploader.py --video-url "$PUBLIC_URL" --caption "$CAPTION" || true
          
          echo "--- Uploading to Facebook Page Reels ---"
          python3 social-publishing-engine/bot_engine/fb_api_uploader.py --video-url "$PUBLIC_URL" --description "$CAPTION" || true

      - name: Update State and Commit
        run: |
          # Update state JSON
          jq ".last_published_index = $NEXT_INDEX" publish_state.json > tmp.json && mv tmp.json publish_state.json
          
          # Commit back to main
          git config --global user.name "Phonk Publisher Bot"
          git config --global user.email "bot@phonkpipeline.local"
          git add publish_state.json
          git commit -m "bot: Auto-published track $NEXT_INDEX from batch $BATCH"
          git push
